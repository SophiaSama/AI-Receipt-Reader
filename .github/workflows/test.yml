name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      # Install root dependencies

    - name: Build backend (required for tests)
      run: node scripts/pre-test-build.cjs
      # Ensures backend is built before tests run

    - name: Run tests
      run: npm run test:integration
      # Run only integration tests (not E2E which need a live server)
      env:
        USE_LOCAL_STORAGE: true
        NODE_ENV: test
        MISTRAL_API_KEY: test-key

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: matrix.node-version == '20.x'
      with:
        files: ./coverage/coverage-final.json
        flags: integration-tests
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install
      # Installs root dependencies

    - name: Install backend dependencies
      run: npm install
      working-directory: backend
      # Backend needs its own dependencies for TypeScript check

    - name: Check frontend TypeScript
      run: npx tsc --noEmit
      # Checks only frontend code (tests and backend excluded in tsconfig.json)

    - name: Check backend TypeScript
      run: npx tsc --noEmit
      working-directory: backend
      # Check backend code with its own tsconfig

  # Notify Vercel about CI results (optional, requires VERCEL_TOKEN)
  notify-vercel:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always() # Run even if tests/lint fail
    steps:
    - name: Notify Vercel of CI Status
      if: github.event_name == 'pull_request' && vars.VERCEL_PROJECT_ID != ''
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const conclusion = '${{ needs.test.result }}' === 'success' && '${{ needs.lint.result }}' === 'success' ? 'success' : 'failure';
          console.log(`CI Status: Tests=${{ needs.test.result }}, Lint=${{ needs.lint.result }}, Overall=${conclusion}`);
          
          // Create a check run for Vercel to see
          await github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'CI/CD Pipeline',
            head_sha: context.payload.pull_request?.head.sha || context.sha,
            status: 'completed',
            conclusion: conclusion,
            output: {
              title: `Integration Tests & Linting ${conclusion === 'success' ? 'Passed' : 'Failed'}`,
              summary: `Tests: ${{ needs.test.result }}\nLint: ${{ needs.lint.result }}`
            }
          });
