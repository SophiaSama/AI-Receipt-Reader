name: E2E Tests (Playwright)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        node-version: [20.x]
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: tests/e2e/playwright/requirements.txt

    - name: Install Node dependencies
      run: npm install

    - name: Build backend
      run: node scripts/pre-test-build.cjs

    - name: Install Python dependencies
      working-directory: tests/e2e/playwright
      run: |
        pip install -r requirements.txt
        playwright install --with-deps ${{ matrix.browser }}

    - name: Start application
      run: |
        npm run dev &
        sleep 10
        npx wait-on http://localhost:3000 --timeout 60000
      env:
        USE_LOCAL_STORAGE: true
        NODE_ENV: test

    - name: Run E2E tests
      working-directory: tests/e2e/playwright
      run: pytest --browser ${{ matrix.browser }} --tracing on
      env:
        BASE_URL: http://localhost:3000
        HEADLESS: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: e2e-results-${{ matrix.browser }}
        path: |
          tests/e2e/playwright/results/
          tests/e2e/playwright/test-results/
        retention-days: 7

    - name: Upload Playwright traces
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-traces-${{ matrix.browser }}
        path: tests/e2e/playwright/results/traces/
        retention-days: 7
